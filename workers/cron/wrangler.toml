name               = "chasernet-cron"
main               = "src/index.js"
compatibility_date = "2024-01-01"

# ── Cron schedule ─────────────────────────────────
[triggers]
crons = ["*/15 * * * *"]   # every 15 minutes

# ── D1 Database ───────────────────────────────────
[[d1_databases]]
binding       = "DB"
database_name = "chasernet-db"
database_id   = "ec6ee472-7f7d-4d5f-aeeb-5740e3502cde"   # same ID as API worker

# ── KV Namespace ──────────────────────────────────
[[kv_namespaces]]
binding = "KV"
id      = "1aee15e72bcf49cfa67255deb4a78707"

[dev]
port = 8789
