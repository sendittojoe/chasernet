name               = "chasernet-chat"
main               = "src/index.js"
compatibility_date = "2024-01-01"

routes = [
  { pattern = "chat.chasernet.com/*", zone_name = "chasernet.com" }
]

# ── Durable Objects ───────────────────────────────
[[durable_objects.bindings]]
name       = "STORM_ROOM"
class_name = "StormRoomDO"

[[durable_objects.bindings]]
name       = "USER_PRESENCE"
class_name = "UserPresenceDO"

[[migrations]]
tag                  = "v1"
new_classes          = ["StormRoomDO"]

[[migrations]]
tag                  = "v2"
new_classes          = ["UserPresenceDO"]

[dev]
port = 8788

# Secrets (set via wrangler secret put):
# JWT_SECRET — shared with API worker for token verification
