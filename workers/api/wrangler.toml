name            = "chasernet-api"
main            = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ── Routes ───────────────────────────────────────
routes = [
  { pattern = "api.chasernet.com/*", zone_name = "chasernet.com" }
]

# ── D1 Database ──────────────────────────────────
[[d1_databases]]
binding  = "DB"
database_name = "chasernet-db"
database_id   = "REPLACE_WITH_YOUR_D1_ID"   # from: wrangler d1 create chasernet-db

# ── R2 Object Storage ────────────────────────────
[[r2_buckets]]
binding     = "ASSETS"
bucket_name = "chasernet-assets"

# ── KV Namespace ─────────────────────────────────
[[kv_namespaces]]
binding = "KV"
id      = "REPLACE_WITH_YOUR_KV_ID"          # from: wrangler kv:namespace create CHASERNET_KV

# ── Secrets (set via: wrangler secret put JWT_SECRET) ──
# JWT_SECRET
# (no other secrets needed at launch — auth is JWT only)

# ── Environment ──────────────────────────────────
[vars]
ENVIRONMENT   = "production"
ALLOWED_ORIGIN = "https://chasernet.com"

[dev]
port = 8787

[env.preview]
name = "chasernet-api-preview"
vars = { ENVIRONMENT = "preview", ALLOWED_ORIGIN = "http://localhost:5173" }
